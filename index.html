<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1911" />
  <title>Earning Point</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag Rewarded Interstitial SDK (zone 11339271) -->
  <script src="//libtl.com/sdk.js" data-zone="11339271" data-sdk="show_11339271"></script>

  <style>
    :root {
      --bg: #0f1911;
      --card: #18241b;
      --border: #26362a;
      --primary: #2fbf71;
      --primary-hover: #29a862;
      --primary-foreground: #f7fbf8;
      --foreground: #eef4ef;
      --muted: #9db3a4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--foreground);
      display: flex;
      justify-content: center;
      min-height: 100dvh;
      line-height: 1.5;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    .app {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 0 32px;
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .balance-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .balance-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .balance-value {
      font-size: 3rem;
      font-weight: 700;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .balance-unit {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .earned-toast {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      opacity: 0;
      transition: opacity 0.3s ease;
      min-height: 1.2em;
    }

    .earned-toast.show {
      opacity: 1;
    }

    .click-btn {
      width: 100%;
      background-color: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 16px;
      padding: 18px 20px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .click-btn:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .click-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .click-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(247, 251, 248, 0.4);
      border-top-color: var(--primary-foreground);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 8px;
    }

    /* Placeholder area where additional Monetag ad code (e.g. a banner) can be added later */
    #monetag-ad-container {
      border: 1px dashed var(--border);
      border-radius: 16px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 12px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Earning Point</h1>
      <p>Watch an ad to earn points</p>
    </header>

    <section class="balance-card" aria-label="Your points balance">
      <span class="balance-label">Balance</span>
      <span class="balance-value" id="points">0</span>
      <span class="balance-unit">points</span>
      <span class="earned-toast" id="earnedToast" role="status" aria-live="polite"></span>
    </section>

    <button class="click-btn" id="clickAdBtn" type="button">
      <span id="btnLabel">Click Ad</span>
    </button>

    <!-- Placeholder for future Monetag banner / additional ad code -->
    <div id="monetag-ad-container">Ad space</div>

    <p class="hint">Points are credited after the ad finishes or is closed.</p>
  </main>

  <script>
    (function () {
      "use strict";

      var POINTS_PER_AD = 10;
      var points = 0;
      var isLoadingAd = false;

      var pointsEl = document.getElementById("points");
      var toastEl = document.getElementById("earnedToast");
      var btn = document.getElementById("clickAdBtn");
      var btnLabel = document.getElementById("btnLabel");
      var toastTimer = null;

      // Initialize the Telegram Mini App so it fills the Telegram window.
      try {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
          tg.ready();
          tg.expand();
        }
      } catch (e) {
        console.log("[v0] Telegram WebApp init skipped:", e);
      }

      function rewardUser() {
        points += POINTS_PER_AD;
        pointsEl.textContent = String(points);

        toastEl.textContent = "+" + POINTS_PER_AD + " points earned!";
        toastEl.classList.add("show");
        if (toastTimer) window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(function () {
          toastEl.classList.remove("show");
        }, 2500);
      }

      function setLoading(loading) {
        isLoadingAd = loading;
        btn.disabled = loading;
        if (loading) {
          btnLabel.textContent = "Loading ad...";
          if (!document.getElementById("btnSpinner")) {
            var s = document.createElement("span");
            s.className = "spinner";
            s.id = "btnSpinner";
            btn.insertBefore(s, btn.firstChild);
          }
        } else {
          btnLabel.textContent = "Click Ad";
          var existing = document.getElementById("btnSpinner");
          if (existing) existing.remove();
        }
      }

      btn.addEventListener("click", function () {
        if (isLoadingAd) return;

        // Monetag Rewarded Interstitial exposed by the SDK for zone 11339271.
        var showAd = window.show_11339271;

        if (typeof showAd !== "function") {
          console.log("[v0] Monetag SDK (show_11339271) is not available yet.");
          return;
        }

        setLoading(true);

        // Rewarded interstitial — reward the user after the ad is watched/closed.
        showAd()
          .then(function () {
            rewardUser();
          })
          .catch(function (error) {
            // User closed the ad early or it failed to load — no reward.
            console.log("[v0] Monetag ad was not completed:", error);
          })
          .finally(function () {
            setLoading(false);
          });
      });
    })();
  </script>
</body>
  </html>
